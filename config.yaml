project:
  name: waterbirds_shortcut_learning
  seed: 42
  output_dir: outputs

data:
  hf_dataset: grodino/waterbirds
  image_size: 224
  num_workers: 2

model:
  architecture: resnet18   # resnet18 or resnet50
  pretrained: true
  num_classes: 2

training:
  epochs: 15
  batch_size: 32
  lr: 0.0001
  weight_decay: 0.0001
  optimizer: adam
  save_best_by: val_worst_group_acc  # val_acc or val_worst_group_acc

evaluation:
  batch_size: 64

gradcam:
  split: test
  max_per_group: 30
  target: predicted   # predicted or true
  foreground_ratio: 0.60

interventions:
  split: test
  max_samples: 1000   # set null in code by passing --max-samples 0 for full test
  foreground_ratio: 0.60
  blur_kernel: 31
